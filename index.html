<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tramper Pay</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFB020">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tramper Pay">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#0E1117; --panel:#171C26; --panel-2:#1E2430; --line:#2A3142;
    --amber:#FFB020; --green:#3DD68C; --text:#EDEFF4; --text-dim:#8B93A7;
    --mono:'SF Mono','Roboto Mono','Consolas',monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding-bottom:140px;min-height:100vh;}
  .topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 80%,transparent);padding:18px 16px 10px;}
  .topbar h1{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin:0 0 2px;font-weight:700;}
  .topbar .sub{font-size:12px;color:var(--text-dim);}
  .topbar-title-row{display:flex;justify-content:space-between;align-items:center;}
  .lang-switch{display:flex;gap:4px;}
  .lang-btn{background:var(--panel-2);border:1px solid var(--line);color:var(--text-dim);font-size:13px;padding:5px 10px;border-radius:8px;cursor:pointer;}
  .lang-btn.active{border-color:var(--amber);color:var(--amber);}
  .weekbar{display:flex;align-items:center;gap:10px;margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 14px;}
  .weekbar label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;}
  .weekbar input[type=date]{background:transparent;border:none;color:var(--text);font-size:15px;font-family:var(--mono);width:100%;}
  .weekbar input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.7);}
  .container{padding:14px 12px 0;max-width:560px;margin:0 auto;}
  .daycard{background:var(--panel);border:1px solid var(--line);border-radius:18px;margin-bottom:12px;overflow:hidden;}
  .daycard.off{opacity:.55;}
  .daycard.weekend{border-color:#3A2E1A;}
  .daycard-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 10px;}
  .dayname{font-size:16px;font-weight:700;}
  .daydate{font-size:12px;color:var(--text-dim);font-family:var(--mono);}
  .daypay{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--green);}
  .daypay.zero{color:var(--text-dim);font-weight:400;}
  .field-row{display:flex;gap:8px;padding:0 14px 12px;flex-wrap:wrap;}
  .field{flex:1 1 auto;min-width:90px;}
  .field.small{flex:0 1 78px;min-width:64px;}
  .field label{display:block;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
  select,input[type=number]{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);font-size:15px;padding:9px 8px;border-radius:10px;appearance:none;-webkit-appearance:none;font-family:inherit;}
  input[type=number]{font-family:var(--mono);text-align:center;}
  select:focus,input:focus{outline:2px solid var(--amber);outline-offset:1px;}
  select.daytype{font-weight:600;}
  .toggles{display:flex;gap:8px;padding:0 14px 14px;flex-wrap:wrap;}
  .toggle-btn{flex:1 1 auto;min-width:80px;background:var(--panel-2);border:1px solid var(--line);color:var(--text-dim);font-size:12.5px;font-weight:600;padding:9px 6px;border-radius:10px;text-align:center;cursor:pointer;user-select:none;transition:all .15s;}
  .toggle-btn.active{background:rgba(255,176,32,.16);border-color:var(--amber);color:var(--amber);}
  .toggle-btn.active.alt{background:rgba(61,214,140,.14);border-color:var(--green);color:var(--green);}
  .summary{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(14,17,23,0) 0%,var(--bg) 22%);padding:18px 14px max(18px,env(safe-area-inset-bottom));z-index:30;}
  .summary-card{max-width:560px;margin:0 auto;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px 18px;box-shadow:0 -4px 24px rgba(0,0,0,.45);display:flex;justify-content:space-between;align-items:center;}
  .summary-left .lbl{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;}
  .summary-left .hrs{font-size:12px;color:var(--text-dim);font-family:var(--mono);margin-top:2px;}
  .summary-right{font-family:var(--mono);font-size:28px;font-weight:800;color:var(--amber);letter-spacing:-.02em;}
  .reset-row{text-align:center;padding:18px 0 6px;}
  .reset-row button{background:none;border:1px solid var(--line);color:var(--text-dim);font-size:12px;padding:8px 16px;border-radius:20px;cursor:pointer;}
  .shift-row{display:none;}
  .shift-row.visible{display:flex;}
  ::placeholder{color:#4B5468;}
  .tax-panel{max-width:560px;margin:0 auto 0 auto;padding:0 12px 16px;}
  .tax-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;}
  .tax-card-title{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);padding:14px 16px 8px;font-weight:700;}
  .tax-row{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;border-top:1px solid var(--line);}
  .tax-row .tl{font-size:13px;color:var(--text-dim);}
  .tax-row .tv{font-family:var(--mono);font-size:14px;font-weight:600;}
  .tax-row.gross .tv{color:var(--text);}
  .tax-row.deduct .tv{color:#FF5C5C;}
  .tax-row.net .tl{color:var(--text);font-weight:700;}
  .tax-row.net .tv{color:var(--amber);font-size:16px;}
  .tax-sub{font-size:11px;color:var(--text-dim);padding:2px 16px 10px;line-height:1.5;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title-row">
    <div>
      <h1>Tramper Pay</h1>
      <div class="sub" id="subTitle"></div>
    </div>
    <div class="lang-switch">
      <button class="lang-btn active" onclick="setLang('uk')">🇺🇦</button>
      <button class="lang-btn" onclick="setLang('en')">🇬🇧</button>
    </div>
  </div>
  <div class="weekbar">
    <label id="lblWeek"></label>
    <input type="date" id="weekStart">
  </div>
  <div style="display:flex;gap:8px;margin-top:8px;">
    <div style="flex:1;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 14px;">
      <label id="lblDriver" style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px;"></label>
      <input type="text" id="driverName" style="background:transparent;border:none;color:var(--text);font-size:15px;width:100%;font-family:inherit;" oninput="saveExtra()">
    </div>
    <div style="flex:1;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 14px;">
      <label id="lblTruck" style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px;"></label>
      <input type="text" id="truckNum" placeholder="AB12 CDE" style="background:transparent;border:none;color:var(--text);font-size:15px;width:100%;font-family:var(--mono);" oninput="saveExtra()">
    </div>
  </div>
</div>

<div class="container" id="daysContainer"></div>

<div class="reset-row">
  <button onclick="resetWeek()" id="btnReset"></button>
  <button onclick="generateReport()" id="btnReport" style="margin-left:10px;border-color:#FFB020;color:#FFB020;"></button>
</div>

<div class="tax-panel" id="taxPanel">
  <div class="tax-card">
    <div class="tax-card-title" id="taxTitle"></div>
    <div class="tax-row gross">
      <span class="tl" id="taxLblGross"></span>
      <span class="tv" id="taxGross">£0.00</span>
    </div>
    <div class="tax-row">
      <span class="tl" id="taxLblAllowance"></span>
      <span class="tv" style="color:var(--green)" id="taxAllowance">£0.00</span>
    </div>
    <div class="tax-row deduct">
      <span class="tl" id="taxLblIT20"></span>
      <span class="tv" id="taxIT20">£0.00</span>
    </div>
    <div class="tax-row deduct" id="taxIT40row">
      <span class="tl" id="taxLblIT40"></span>
      <span class="tv" id="taxIT40">£0.00</span>
    </div>
    <div class="tax-row deduct">
      <span class="tl" id="taxLblNI6"></span>
      <span class="tv" id="taxNI6">£0.00</span>
    </div>
    <div class="tax-row deduct" id="taxNI1row">
      <span class="tl" id="taxLblNI1"></span>
      <span class="tv" id="taxNI1">£0.00</span>
    </div>
    <div class="tax-row net">
      <span class="tl" id="taxLblTakeHome"></span>
      <span class="tv" id="taxTakeHome">£0.00</span>
    </div>
    <div class="tax-sub" id="taxNote"></div>
  </div>
</div>

<div class="summary">
  <div class="summary-card">
    <div class="summary-left">
      <div class="lbl" id="lblTotal"></div>
      <div class="hrs" id="totalHours"></div>
    </div>
    <div class="summary-right" id="totalPay">£0.00</div>
  </div>
</div>

<script>
// ===================== RATES =====================
const RATES = {
  basicDaily:123.20, mealAllowance:10.00, otStandard:12.00,
  satRunUp5:12.00, satRunAfter5:14.00,
  sunRunUp5:14.00, sunRunAfter5:16.00,
  nightOut:26.20, nightIn:16.00, holiday:123.20,
  splitter:16.00, adr:20.00, genset:12.00,
  samsaraA:9.60, samsaraB:6.40, samsaraC:4.00
};

// ===================== TRANSLATIONS =====================
const T = {
  uk: {
    sub: "Чиста зарплатня за тиждень",
    lblWeek: "Тиждень з (Нд)",
    lblDriver: "Водій",
    lblTruck: "Номер фури",
    driverPlaceholder: "Ім'я прізвище",
    btnReset: "Скинути тиждень",
    btnReport: "📋 Звіт тижня",
    lblTotal: "Net за тиждень",
    totalHours: (h,d) => `${h} год · ${d} дн.`,
    days: ["Неділя","Понеділок","Вівторок","Середа","Четвер","П'ятниця","Субота"],
    fldDayType: "Тип дня",
    fldHours: "Години",
    fldADR: "ADR",
    fldGenset: "Генсет",
    fldSplitter: "Сплітер",
    fldSamsara: "Самсара",
    nightOut: "🌙 Ночівля поза домом",
    nightIn: "🏠 Ночівля вдома (Night In)",
    dayOpts: {
      weekday: ["Будній","Святковий","Відпустка","Вихідний"],
      sat:     ["Робочий","Святковий","Відпустка","Вихідний"],
      sun:     ["Робоча","Відпустка","Вихідний"],
    },
    samsaraOpts: [["none","—"],["A","A · Зелена"],["B","B · Жовта"],["C","C · Червона"]],
    daytypeMap: {"Будній":"weekday","Робочий":"saturday","Робоча":"sunday","Святковий":"bankholiday","Відпустка":"holiday","Вихідний":"off"},
    daytypeLabel: {weekday:"Будній",saturday:"Субота (робочий)",sunday:"Неділя (робоча)",bankholiday:"Святковий",holiday:"Відпустка",off:"Вихідний"},
    samsaraLabel: {none:"—",A:"A (Зелена)",B:"B (Жовта)",C:"C (Червона)"},
    reportTitle: "ЗВІТ ТИЖНЯ — TRAMPER DRIVER",
    reportWeek: "Тиждень з",
    reportDriver: "Водій",
    reportTruck: "Фура",
    reportDayType: "Тип дня",
    reportHours: "Години",
    reportADR: "ADR",
    reportGenset: "Генсет",
    reportSplitter: "Сплітер",
    reportSamsara: "Самсара",
    reportNightOut: "Ночівля поза домом (Night Out)",
    reportNightIn: "Ночівля вдома (Night In)",
    reportNetPay: "NET PAY",
    reportTotalDays: "РАЗОМ ДНІВ",
    reportTotalHours: "РАЗОМ ГОДИН",
    reportTotalNet: "РАЗОМ NET",
    reportGenerated: "Сформовано",
    locale: 'uk-UA',
  },
  en: {
    sub: "Weekly net pay calculator",
    lblWeek: "Week from (Sun)",
    lblDriver: "Driver",
    lblTruck: "Truck number",
    driverPlaceholder: "Full name",
    btnReset: "Reset week",
    btnReport: "📋 Weekly report",
    lblTotal: "Net this week",
    totalHours: (h,d) => `${h} hrs · ${d} days`,
    days: ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
    fldDayType: "Day type",
    fldHours: "Hours",
    fldADR: "ADR",
    fldGenset: "Genset",
    fldSplitter: "Splitter",
    fldSamsara: "Samsara",
    nightOut: "🌙 Night Out",
    nightIn: "🏠 Night In",
    dayOpts: {
      weekday: ["Weekday","Bank Holiday","Holiday","Day Off"],
      sat:     ["Working","Bank Holiday","Holiday","Day Off"],
      sun:     ["Working","Holiday","Day Off"],
    },
    samsaraOpts: [["none","—"],["A","A · Green"],["B","B · Amber"],["C","C · Red"]],
    daytypeMap: {"Weekday":"weekday","Working":"saturday","Bank Holiday":"bankholiday","Holiday":"holiday","Day Off":"off"},
    daytypeLabel: {weekday:"Weekday",saturday:"Saturday (working)",sunday:"Sunday (working)",bankholiday:"Bank Holiday",holiday:"Holiday",off:"Day Off"},
    samsaraLabel: {none:"—",A:"A (Green)",B:"B (Amber)",C:"C (Red)"},
    reportTitle: "WEEKLY REPORT — TRAMPER DRIVER",
    reportWeek: "Week from",
    reportDriver: "Driver",
    reportTruck: "Truck",
    reportDayType: "Day type",
    reportHours: "Hours",
    reportADR: "ADR",
    reportGenset: "Genset",
    reportSplitter: "Splitter",
    reportSamsara: "Samsara",
    reportNightOut: "Night Out",
    reportNightIn: "Night In",
    reportNetPay: "NET PAY",
    reportTotalDays: "TOTAL DAYS",
    reportTotalHours: "TOTAL HOURS",
    reportTotalNet: "TOTAL NET",
    reportGenerated: "Generated",
    locale: 'en-GB',
  }
};

// "Working" in English maps to sat for sat row, sun for sun row — handled in listener by index

let lang = "uk";
const DAY_KEYS = ["sun","mon","tue","wed","thu","fri","sat"];
let state = {};

function t(){ return T[lang]; }

function defaultDayState(i){
  return {dayType:(i>=1&&i<=5)?"weekday":"off",shiftType:"-",hours:"",adr:0,genset:0,splitter:0,samsara:"C",nightOut:false,nightIn:false};
}
function loadState(){ DAY_KEYS.forEach((k,i)=>{ state[k]=defaultDayState(i); }); }
loadState();
try {
  const saved = localStorage.getItem('tramperState');
  if(saved) state = JSON.parse(saved);
  const savedWeek = localStorage.getItem('tramperWeek');
  if(savedWeek) document.getElementById('weekStart').value = savedWeek;
  const savedLang = localStorage.getItem('tramperLang');
  if(savedLang) lang = savedLang;
} catch(e){}

function fmt(n){ return "£"+n.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function calcDay(d){
  if(d.dayType==="off") return 0;
  let base=0;
  const hrs=parseFloat(d.hours)||0;
  if(d.dayType==="holiday"){
    base=RATES.holiday;
  } else if(d.dayType==="weekday"){
    base=RATES.basicDaily+RATES.mealAllowance+Math.max(0,hrs-11)*RATES.otStandard;
  } else if(d.dayType==="saturday"){
    base = hrs<=5 ? hrs*RATES.satRunUp5 : hrs*RATES.satRunAfter5;
    if(hrs>10) base+=RATES.mealAllowance;
  } else {
    // sunday / bankholiday
    base = hrs<=5 ? hrs*RATES.sunRunUp5 : hrs*RATES.sunRunAfter5;
    if(hrs>10) base+=RATES.mealAllowance;
  }
  let bonuses=(d.adr||0)*RATES.adr+(d.genset||0)*RATES.genset+(d.splitter||0)*RATES.splitter;
  if(d.samsara==="A") bonuses+=RATES.samsaraA;
  else if(d.samsara==="B") bonuses+=RATES.samsaraB;
  else if(d.samsara==="C") bonuses+=RATES.samsaraC;
  if(d.nightOut) bonuses+=RATES.nightOut;
  if(d.nightIn) bonuses+=RATES.nightIn;
  return base+bonuses;
}

function getDayOpts(i){
  if(i>=1&&i<=5) return t().dayOpts.weekday;
  if(i===6) return t().dayOpts.sat;
  return t().dayOpts.sun;
}

function mapDayType(label, i){
  // "Working" in EN differs per day
  if((label==="Working"||label==="Робочий")&&i===6) return "saturday";
  if((label==="Working"||label==="Робоча")) return "sunday";
  return t().daytypeMap[label] || "off";
}

function getDayTypeLabel(dayType, i){
  // reverse map — find the option label for this dayType
  const opts = getDayOpts(i);
  const map = t().daytypeMap;
  for(const opt of opts){
    let mapped = map[opt];
    if(!mapped){
      if((opt==="Working"||opt==="Робочий")&&i===6) mapped="saturday";
      else if(opt==="Working"||opt==="Робоча") mapped="sunday";
    }
    if(mapped===dayType) return opt;
  }
  return opts[0];
}

// ---- Build DOM once ----
function buildDOM(){
  const container = document.getElementById('daysContainer');
  container.innerHTML = "";
  DAY_KEYS.forEach((key,i)=>{
    const d = state[key];
    const isWeekend = (i===0||i===6);
    const card = document.createElement('div');
    card.className = "daycard"+(isWeekend?" weekend":"");
    card.id = "card-"+key;

    const opts = getDayOpts(i);
    const sOpts = t().samsaraOpts;

    card.innerHTML = `
      <div class="daycard-head">
        <div>
          <div class="dayname" id="dayname-${key}">${t().days[i]}</div>
          <div class="daydate" id="date-${key}"></div>
        </div>
        <div class="daypay zero" id="pay-${key}">£0.00</div>
      </div>
      <div class="field-row">
        <div class="field">
          <label id="lbl-daytype-${key}">${t().fldDayType}</label>
          <select class="daytype" id="daytype-${key}">
            ${opts.map(o=>`<option value="${o}">${o}</option>`).join('')}
          </select>
        </div>
        <div class="field small" id="hoursfield-${key}">
          <label id="lbl-hours-${key}">${t().fldHours}</label>
          <input type="number" inputmode="decimal" min="0" max="24" step="0.5" placeholder="0" id="hours-${key}">
        </div>
      </div>
      <div class="field-row shift-row" id="shiftrow-${key}" style="display:none;"></div>
      <div id="bonusblock-${key}">
        <div class="field-row">
          <div class="field small">
            <label id="lbl-adr-${key}">${t().fldADR}</label>
            <input type="number" inputmode="numeric" min="0" max="10" placeholder="0" id="adr-${key}">
          </div>
          <div class="field small">
            <label id="lbl-genset-${key}">${t().fldGenset}</label>
            <input type="number" inputmode="numeric" min="0" max="10" placeholder="0" id="genset-${key}">
          </div>
          <div class="field small">
            <label id="lbl-splitter-${key}">${t().fldSplitter}</label>
            <input type="number" inputmode="numeric" min="0" max="10" placeholder="0" id="splitter-${key}">
          </div>
          <div class="field">
            <label id="lbl-samsara-${key}">${t().fldSamsara}</label>
            <select id="samsara-${key}">
              ${sOpts.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="toggles">
          <div class="toggle-btn" id="nightout-${key}" data-key="${key}" data-field="nightOut"></div>
          <div class="toggle-btn alt" id="nightin-${key}" data-key="${key}" data-field="nightIn"></div>
        </div>
      </div>
    `;
    container.appendChild(card);

    document.getElementById('daytype-'+key).addEventListener('change', e=>{
      state[key].dayType = mapDayType(e.target.value, i);
      applyVisibility(key, i);
      updateTotals();
    });
    document.getElementById('hours-'+key).addEventListener('input', e=>{
      state[key].hours = e.target.value;
      updateTotals();
    });
    ['adr','genset','splitter'].forEach(f=>{
      document.getElementById(f+'-'+key).addEventListener('input', e=>{
        state[key][f] = parseFloat(e.target.value)||0;
        updateTotals();
      });
    });
    document.getElementById('samsara-'+key).addEventListener('change', e=>{
      state[key].samsara = e.target.value;
      updateTotals();
    });
    ['nightOut','nightIn'].forEach(f=>{
      const id = (f==='nightOut'?'nightout':'nightin')+'-'+key;
      document.getElementById(id).addEventListener('click', ()=>{
        state[key][f] = !state[key][f];
        document.getElementById(id).classList.toggle('active', state[key][f]);
        updateTotals();
      });
    });
  });
}

function applyLangLabels(){
  // static labels
  document.getElementById('subTitle').textContent = t().sub;
  document.getElementById('lblWeek').textContent = t().lblWeek;
  document.getElementById('lblDriver').textContent = t().lblDriver;
  document.getElementById('lblTruck').textContent = t().lblTruck;
  document.getElementById('driverName').placeholder = t().driverPlaceholder;
  document.getElementById('btnReset').textContent = t().btnReset;
  document.getElementById('btnReport').textContent = t().btnReport;
  document.getElementById('lblTotal').textContent = t().lblTotal;
  // lang buttons
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.includes(lang==='uk'?'🇺🇦':'🇬🇧'));
  });
  // per-day labels
  DAY_KEYS.forEach((key,i)=>{
    const el = document.getElementById('dayname-'+key);
    if(el) el.textContent = t().days[i];
    const ldt = document.getElementById('lbl-daytype-'+key);

    const lh = document.getElementById('lbl-hours-'+key);
    if(lh) lh.textContent = t().fldHours;
    const la = document.getElementById('lbl-adr-'+key);
    if(la) la.textContent = t().fldADR;
    const lg = document.getElementById('lbl-genset-'+key);
    if(lg) lg.textContent = t().fldGenset;
    const ls = document.getElementById('lbl-splitter-'+key);
    if(ls) ls.textContent = t().fldSplitter;
    const lsa = document.getElementById('lbl-samsara-'+key);
    if(lsa) lsa.textContent = t().fldSamsara;
    // toggle buttons
    const no = document.getElementById('nightout-'+key);
    if(no) no.textContent = t().nightOut;
    const ni = document.getElementById('nightin-'+key);
    if(ni) ni.textContent = t().nightIn;
    // samsara options
    const sel = document.getElementById('samsara-'+key);
    if(sel){
      const cur = sel.value;
      sel.innerHTML = t().samsaraOpts.map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
      sel.value = cur;
    }
    // daytype options
    const dsel = document.getElementById('daytype-'+key);
    if(dsel){
      const curType = state[key].dayType;
      const opts = getDayOpts(i);
      dsel.innerHTML = opts.map(o=>`<option value="${o}">${o}</option>`).join('');
      // restore selected
      const lbl = getDayTypeLabel(curType, i);
      dsel.value = lbl;
    }
  });
}

function applyVisibility(key, i){
  const idx = DAY_KEYS.indexOf(key);
  const ii = i !== undefined ? i : idx;
  const d = state[key];
  const isOff = d.dayType==="off";
  const isWeekendType = ["saturday","sunday","bankholiday"].includes(d.dayType);
  const card = document.getElementById('card-'+key);
  card.classList.toggle('off', isOff);
  card.classList.toggle('weekend', isWeekendType);
  document.getElementById('hoursfield-'+key).style.display = isOff?'none':'';
  document.getElementById('bonusblock-'+key).style.display = isOff?'none':'';
  // sync select
  const lbl = getDayTypeLabel(d.dayType, ii);
  const dsel = document.getElementById('daytype-'+key);
  if(dsel) dsel.value = lbl;
  // night toggle classes
  const no = document.getElementById('nightout-'+key);
  const ni = document.getElementById('nightin-'+key);
  if(no) no.classList.toggle('active', d.nightOut);
  if(ni) ni.classList.toggle('active', d.nightIn);
}

function syncValues(){
  DAY_KEYS.forEach((key,i)=>{
    const d = state[key];
    const hoursEl = document.getElementById('hours-'+key);
    if(hoursEl && document.activeElement !== hoursEl) hoursEl.value = d.hours;
    ['adr','genset','splitter'].forEach(f=>{
      const el = document.getElementById(f+'-'+key);
      if(el && document.activeElement !== el) el.value = d[f]||"";
    });
    const sel = document.getElementById('samsara-'+key);
    if(sel) sel.value = d.samsara;
    applyVisibility(key, i);
  });
}

function updateDates(){
  const val = document.getElementById('weekStart').value;
  const weekStart = val ? new Date(val+"T00:00:00") : null;
  DAY_KEYS.forEach((key,i)=>{
    let dateStr = "";
    if(weekStart){
      const dt = new Date(weekStart);
      dt.setDate(dt.getDate()+i);
      dateStr = dt.toLocaleDateString(t().locale,{day:'2-digit',month:'2-digit'});
    }
    document.getElementById('date-'+key).textContent = dateStr;
  });
}

// ===================== HMRC TAX CALC =====================
// Gross = employer gross (net / 0.8 for taxable, or actual gross from rates)
// We store net rates. To get gross: taxable items gross = net/0.8, tax-free = net
// Simpler: use the gross column from rates directly
// Gross rates: basicDaily=154, meal=10(tax-free), otStd=15, sat rates gross, sun rates gross etc.
// We'll compute gross from net: taxable net = gross*0.8 => gross = net/0.8
// Tax-free items: nightOut=26.20, meal=10 stay as-is (no tax)
// Actually employer already deducted 20% flat. HMRC recalculates on total gross with bands.
// So: gross = sum of (taxable_net / 0.8) + tax_free items
// Then apply HMRC bands on gross

const GROSS_RATES = {
  basicDaily: 154.00,
  otStandard: 15.00,
  satRunUp5: 15.00,
  satRunAfter5: 17.50,
  sunRunUp5: 17.50,
  sunRunAfter5: 20.00,
  splitter: 20.00,
  adr: 25.00,
  genset: 15.00,
  samsaraA: 12.00,
  samsaraB: 8.00,
  samsaraC: 5.00,
  holiday: 154.00,
  nightIn: 20.00,
  // tax-free:
  mealAllowance: 10.00,
  nightOut: 26.20,
};

function calcDayGross(d){
  if(d.dayType==="off") return {taxable:0, taxFree:0};
  let taxable=0, taxFree=0;
  const hrs=parseFloat(d.hours)||0;

  if(d.dayType==="holiday"){
    taxable += GROSS_RATES.holiday;
  } else if(d.dayType==="weekday"){
    taxable += GROSS_RATES.basicDaily;
    taxFree += GROSS_RATES.mealAllowance; // meal is tax-free
    taxable += Math.max(0, hrs-11)*GROSS_RATES.otStandard;
  } else if(d.dayType==="saturday"){
    taxable += hrs<=5 ? hrs*GROSS_RATES.satRunUp5 : hrs*GROSS_RATES.satRunAfter5;
    if(hrs>10) taxFree += GROSS_RATES.mealAllowance;
  } else {
    taxable += hrs<=5 ? hrs*GROSS_RATES.sunRunUp5 : hrs*GROSS_RATES.sunRunAfter5;
    if(hrs>10) taxFree += GROSS_RATES.mealAllowance;
  }

  taxable += (d.adr||0)*GROSS_RATES.adr;
  taxable += (d.genset||0)*GROSS_RATES.genset;
  taxable += (d.splitter||0)*GROSS_RATES.splitter;
  if(d.samsara==="A") taxable += GROSS_RATES.samsaraA;
  else if(d.samsara==="B") taxable += GROSS_RATES.samsaraB;
  else if(d.samsara==="C") taxable += GROSS_RATES.samsaraC;

  taxFree += d.nightOut ? GROSS_RATES.nightOut : 0;
  taxable += d.nightIn ? GROSS_RATES.nightIn : 0;

  return {taxable, taxFree};
}

function calcHMRC(grossTaxable){
  // Weekly thresholds 2024/25 (based on £12,570 PA / 52)
  const allowance = 242;   // tax-free per week
  const basic_limit = 967; // 20% band up to here
  const higher = 967;      // 40% above this

  // Income Tax
  let it20=0, it40=0;
  const taxable = Math.max(0, grossTaxable - allowance);
  const in20band = Math.min(taxable, higher - allowance);
  it20 = in20band * 0.20;
  const in40band = Math.max(0, grossTaxable - higher);
  it40 = in40band * 0.40;

  // NI (employee)
  let ni6=0, ni1=0;
  const ni_taxable = Math.max(0, grossTaxable - allowance);
  const ni_in6band = Math.min(ni_taxable, higher - allowance);
  ni6 = ni_in6band * 0.06;
  const ni_in1band = Math.max(0, grossTaxable - higher);
  ni1 = ni_in1band * 0.01;

  const totalTax = it20 + it40 + ni6 + ni1;
  const takeHome = grossTaxable - totalTax;

  return {grossTaxable, allowance: Math.min(grossTaxable, allowance), it20, it40, ni6, ni1, totalTax, takeHome};
}

function updateTaxPanel(grossTaxable, taxFree){
  const r = calcHMRC(grossTaxable);
  const tr = t();

  document.getElementById('taxTitle').textContent = tr.taxTitle;
  document.getElementById('taxLblGross').textContent = tr.taxLblGross;
  document.getElementById('taxLblAllowance').textContent = tr.taxLblAllowance;
  document.getElementById('taxLblIT20').textContent = tr.taxLblIT20;
  document.getElementById('taxLblIT40').textContent = tr.taxLblIT40;
  document.getElementById('taxLblNI6').textContent = tr.taxLblNI6;
  document.getElementById('taxLblNI1').textContent = tr.taxLblNI1;
  document.getElementById('taxLblTakeHome').textContent = tr.taxLblTakeHome;
  document.getElementById('taxNote').textContent = tr.taxNote;

  document.getElementById('taxGross').textContent = fmt(grossTaxable + taxFree);
  document.getElementById('taxAllowance').textContent = fmt(r.allowance + taxFree);
  document.getElementById('taxIT20').textContent = '-'+fmt(r.it20);
  document.getElementById('taxIT40').textContent = '-'+fmt(r.it40);
  document.getElementById('taxNI6').textContent = '-'+fmt(r.ni6);
  document.getElementById('taxNI1').textContent = '-'+fmt(r.ni1);
  document.getElementById('taxTakeHome').textContent = fmt(r.takeHome + taxFree);

  // hide 40% and NI 1% rows if zero
  document.getElementById('taxIT40row').style.display = r.it40>0 ? '' : 'none';
  document.getElementById('taxNI1row').style.display = r.ni1>0 ? '' : 'none';
}

function saveExtra(){
  try{
    localStorage.setItem('tramperDriver', document.getElementById('driverName').value);
    localStorage.setItem('tramperTruck', document.getElementById('truckNum').value);
  } catch(e){}
}

function saveState(){
  try{ localStorage.setItem('tramperState', JSON.stringify(state)); } catch(e){}
  try{ localStorage.setItem('tramperWeek', document.getElementById('weekStart').value); } catch(e){}
}

function updateTotals(){
  let totalPay=0, totalHours=0, daysWorked=0;
  let totalGrossTaxable=0, totalTaxFree=0;
  DAY_KEYS.forEach(key=>{
    const d = state[key];
    const pay = calcDay(d);
    totalPay += pay;
    totalHours += parseFloat(d.hours)||0;
    if(d.dayType!=="off") daysWorked++;
    const {taxable, taxFree} = calcDayGross(d);
    totalGrossTaxable += taxable;
    totalTaxFree += taxFree;
    const payEl = document.getElementById('pay-'+key);
    if(payEl){ payEl.textContent = fmt(pay); payEl.className = "daypay"+(pay===0?" zero":""); }
  });
  document.getElementById('totalPay').textContent = fmt(totalPay);
  document.getElementById('totalHours').textContent = t().totalHours(totalHours, daysWorked);
  updateTaxPanel(totalGrossTaxable, totalTaxFree);
  saveState();
}

function resetWeek(){
  loadState();
  syncValues();
  DAY_KEYS.forEach(key=>{
    document.getElementById('nightout-'+key).classList.remove('active');
    document.getElementById('nightin-'+key).classList.remove('active');
  });
  updateTotals();
}

document.getElementById('weekStart').addEventListener('change', updateDates);

function generateReport(){
  const tr = t();
  const weekVal = document.getElementById('weekStart').value;
  const weekStart = weekVal ? new Date(weekVal+"T00:00:00") : null;
  const weekStr = weekStart ? weekStart.toLocaleDateString(tr.locale,{day:'2-digit',month:'2-digit',year:'numeric'}) : "—";
  const driverName = document.getElementById('driverName').value || "—";
  const truckNum = document.getElementById('truckNum').value || "—";

  let lines = [];
  lines.push("========================================");
  lines.push("  "+tr.reportTitle);
  lines.push("  "+tr.reportWeek+": "+weekStr);
  lines.push("  "+tr.reportDriver+":     "+driverName);
  lines.push("  "+tr.reportTruck+":      "+truckNum);
  lines.push("========================================");
  lines.push("");

  let totalPay=0, totalHours=0, daysWorked=0;
  let totalGrossTaxable=0, totalTaxFree=0;

  DAY_KEYS.forEach((key,i)=>{
    const d = state[key];
    const pay = calcDay(d);
    const {taxable:dgt, taxFree:dtf} = calcDayGross(d);
    totalGrossTaxable+=dgt; totalTaxFree+=dtf;
    const hrs = parseFloat(d.hours)||0;
    const dateStr = weekStart ? (()=>{ const dt=new Date(weekStart); dt.setDate(dt.getDate()+i); return dt.toLocaleDateString(tr.locale,{day:'2-digit',month:'2-digit'}); })() : "";

    lines.push("----------------------------------------");
    lines.push(tr.days[i]+(dateStr?"  "+dateStr:""));
    lines.push("  "+tr.reportDayType+":    "+(tr.daytypeLabel[d.dayType]||d.dayType));

    if(d.dayType!=="off"){
      lines.push("  "+tr.reportHours+":     "+hrs);
      if(d.adr>0)      lines.push("  "+tr.reportADR+":        "+d.adr+" × £20.00 = £"+(d.adr*20).toFixed(2));
      if(d.genset>0)   lines.push("  "+tr.reportGenset+":     "+d.genset+" × £12.00 = £"+(d.genset*12).toFixed(2));
      if(d.splitter>0) lines.push("  "+tr.reportSplitter+":    "+d.splitter+" × £16.00 = £"+(d.splitter*16).toFixed(2));
      if(d.samsara!=="none") lines.push("  "+tr.reportSamsara+":    "+tr.samsaraLabel[d.samsara]);
      if(d.nightOut)   lines.push("  "+tr.reportNightOut+" £26.20");
      if(d.nightIn)    lines.push("  "+tr.reportNightIn+" £16.00");
      lines.push("  "+tr.reportNetPay+":   £"+pay.toFixed(2));
      totalHours+=hrs; daysWorked++;
    } else {
      lines.push("  "+tr.reportNetPay+":   £0.00");
    }
    totalPay+=pay;
  });

  lines.push("========================================");
  lines.push("  "+tr.reportTotalDays+":   "+daysWorked);
  lines.push("  "+tr.reportTotalHours+":  "+totalHours);
  lines.push("  "+tr.reportTotalNet+":    £"+totalPay.toFixed(2));
  lines.push("========================================");
  lines.push("");
  // HMRC section
  const hmrc = calcHMRC(totalGrossTaxable);
  const totalGross = totalGrossTaxable + totalTaxFree;
  lines.push("");
  lines.push("========================================");
  lines.push("  HMRC — "+tr.taxTitle);
  lines.push("========================================");
  lines.push("  "+tr.rptGross.padEnd(28)+" £"+totalGross.toFixed(2));
  lines.push("    "+tr.taxLblAllowance.padEnd(26)+" £"+(hmrc.allowance+totalTaxFree).toFixed(2));
  lines.push("  --- Income Tax ---");
  lines.push("    "+tr.rptIT20.padEnd(26)+" -£"+hmrc.it20.toFixed(2));
  if(hmrc.it40>0)
    lines.push("    "+tr.rptIT40.padEnd(26)+" -£"+hmrc.it40.toFixed(2));
  lines.push("  --- National Insurance ---");
  lines.push("    "+tr.rptNI6.padEnd(26)+" -£"+hmrc.ni6.toFixed(2));
  if(hmrc.ni1>0)
    lines.push("    "+tr.rptNI1.padEnd(26)+" -£"+hmrc.ni1.toFixed(2));
  lines.push("----------------------------------------");
  lines.push("  "+tr.rptTakeHome.padEnd(28)+" £"+(hmrc.takeHome+totalTaxFree).toFixed(2));
  lines.push("========================================");
  lines.push("  * "+tr.taxNote);
  lines.push("");

  lines.push(tr.reportGenerated+": "+new Date().toLocaleDateString(tr.locale,{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}));

  const text = lines.join("\n");
  const blob = new Blob(["\uFEFF"+text],{type:"text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url;
  a.download = weekVal?"tramper_"+weekVal+".txt":"tramper_report.txt";
  a.click();
  URL.revokeObjectURL(url);
}
